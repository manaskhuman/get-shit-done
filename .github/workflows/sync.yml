name: Sync Fork

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync upstream
        run: |
          git config --global user.email "manas.anupam7@gmail.com"
          git config --global user.name "manaskhuman"
          git remote add upstream https://github.com/gsd-build/get-shit-done.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
